{% if form.errors %}
<div class="bg-red-50 border border-red-200 rounded-lg p-3 mb-3 space-y-1">
  <p class="font-semibold text-red-700 text-sm">Исправьте ошибки:</p>
  {% for field in form %}
    {% for error in field.errors %}
      <p class="text-red-600 text-xs">• <strong>{{ field.label }}:</strong> {{ error }}</p>
    {% endfor %}
  {% endfor %}
</div>
{% endif %}
